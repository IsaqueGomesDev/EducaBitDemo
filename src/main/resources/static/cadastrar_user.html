<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="img/EducaBit_logo.png" type="image/png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <title>EDUCABIT</title>
</head>

<body style="background-color: #f5f5f5;">
  <div class="menu">
    <nav class="navegacao">
      <a href="tela_inicial.html"><img src="img/EducaBit_logo.png" class="logo"></a>
      <div class="container-fluid" style="margin-left: 75%;">
        <form class="d-flex position-relative" role="search">
          <input class="form-control me-2" type="search" placeholder="Pesquisar" aria-label="Search" />
          <i class="bi bi-search position-absolute"
            style="left: 40%; top: 50%; transform: translateY(-50%); color: gray;"></i>
        </form>
      </div>
    </nav>
  </div>

  <div class="login_campo">
    <main class="form-signin w-100 m-auto">
      <div class="form-floating"><input type="text" class="form-control" id="nomeCompleto" placeholder="Seu nome"
          name="nomeCompleto" style="margin-top: 10px;"><label for="nomeCompleto">Nome</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="usuario" placeholder="Usuário"
          name="usuario" style="margin-top: 10px;"><label for="usuario">Usuário</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="cpf" placeholder="CPF" name="cpf"
          style="margin-top: 10px;"><label for="cpf">CPF</label></div>
      <div class="form-floating">
        <input type="text" class="form-control" id="email" placeholder="Email" name="email" style="margin-top: 10px;">
        <label for="email">Email</label>
      </div>
      <div class="form-floating"> <input type="password" class="form-control" id="senha" placeholder="Senha"
          name="senha" style="margin-top: 10px;"><label for="senha">Senha</label></div>

      <!-- Endereco Fields -->
      <h5 style="margin-top: 20px; color: #006dac;">Endereço</h5>
      <div class="form-floating"><input type="text" class="form-control" id="cep" placeholder="CEP" name="cep"
          style="margin-top: 10px;" maxlength="9"><label for="cep">CEP</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="logradouro" placeholder="Logradouro"
          name="logradouro" style="margin-top: 10px;"><label for="logradouro">Logradouro</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="numero" placeholder="Número" name="numero"
          style="margin-top: 10px;"><label for="numero">Número</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="complemento" placeholder="Complemento"
          name="complemento" style="margin-top: 10px;"><label for="complemento">Complemento</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="bairro" placeholder="Bairro" name="bairro"
          style="margin-top: 10px;"><label for="bairro">Bairro</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="localidade" placeholder="Cidade"
          name="localidade" style="margin-top: 10px;"><label for="localidade">Cidade</label></div>
      <div class="form-floating"><input type="text" class="form-control" id="uf" placeholder="UF" name="uf"
          style="margin-top: 10px;"><label for="uf">UF</label></div>
      <div class="button"><button class="btn btn-primary w-100 py-2" type="button" id="btnCadastrar"
          style="font-weight: bold; margin-top: 20px; color: white;">Cadastrar</button></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"></script>
  <script>
    (function () {
      const btn = document.getElementById('btnCadastrar');
      const cepInput = document.getElementById('cep');

      // Viacep integration
      cepInput.addEventListener('blur', async () => {
        let cep = cepInput.value.replace(/\D/g, '');
        if (cep.length === 8) {
          try {
            const res = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
            const data = await res.json();
            if (!data.erro) {
              document.getElementById('logradouro').value = data.logradouro;
              document.getElementById('bairro').value = data.bairro;
              document.getElementById('localidade').value = data.localidade;
              document.getElementById('uf').value = data.uf;
            } else {
              alert('CEP não encontrado.');
            }
          } catch (e) {
            console.error('Erro ao buscar CEP', e);
          }
        }
      });

      btn.addEventListener('click', async () => {
        const username = document.getElementById('usuario').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('senha').value.trim();
        const cpf = document.getElementById('cpf').value.trim();

        // Address data
        const endereco = {
          cep: document.getElementById('cep').value,
          logradouro: document.getElementById('logradouro').value,
          numero: document.getElementById('numero').value,
          complemento: document.getElementById('complemento').value,
          bairro: document.getElementById('bairro').value,
          localidade: document.getElementById('localidade').value,
          uf: document.getElementById('uf').value
        };

        if (!username || !email || !password || !cpf) {
          alert('Preencha usuário, CPF, email e senha.');
          return;
        }
        try {
          const res = await fetch('/educabit/usuario', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, type: 'USER', email, password, cpf, endereco })
          });
          if (!res.ok) {
            const msg = await res.text();
            throw new Error(msg || 'Erro ao cadastrar');
          }
          const newUser = await res.json();

          // Auto-login
          localStorage.setItem('userId', newUser.id);
          localStorage.setItem('userName', newUser.username);

          alert('Cadastro realizado com sucesso!');
          window.location.href = 'planos.html';
        } catch (err) {
          alert('Erro: ' + err.message);
        }
      });
    })();
  </script>
</body>

</html>
