<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="img/EducaBit_logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <title>EDUCABIT</title>
</head>

<body style="background-color: #f5f5f5;">
  <div class="menu">
    <nav class="navegacao">
      <a href="tela_inicial.html"><img src="img/EducaBit_logo.png" class="logo"></a>
      <div class="container-fluid" style="margin-left: 75%;">
        <form class="d-flex position-relative" role="search">
          <input class="form-control me-2" type="search" placeholder="Pesquisar" aria-label="Search" />
          <i class="bi bi-search position-absolute"
            style="left: 50%; top: 50%; transform: translateY(-50%); color: gray;"></i>
        </form>
      </div>
    </nav>
  </div>
  <div class="login_campo" style="margin-top: 10%;">
    <main class="form-signin w-100 m-auto">
      <form action="/perform_login" method="post">
        <div class="form-floating"><input type="text" class="form-control" id="username" placeholder="Usuário"
            name="username" style="margin-top: 10px;" required><label for="username">Usuário</label></div>
        <div class="form-floating"> <input type="password" class="form-control" id="password" placeholder="Senha"
            name="password" style="margin-top: 10px;" required><label for="password">Senha</label></div>
        <h2 style="font-size: 15px; color: #006dac; margin-top: 10px;">Esqueceu sua senha?</h2>
        <div class="button"><button class="btn btn-primary w-100 py-2" type="submit"
            style="font-weight: bold; margin-top: 20px; color: white;">Entrar</button></div>
      </form>
      <button id="btnGoogleLogin" class="btn btn-outline-primary w-100 py-2" type="button"
        style="font-weight: bold; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;">
        Entrar com a conta do Google <i class="bi bi-google"></i>
      </button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
    crossorigin="anonymous"></script>
  <script>
    // Google Login Logic (Mock)
    const btnGoogle = document.getElementById('btnGoogleLogin');
    if (btnGoogle) {
      btnGoogle.addEventListener('click', () => {
        alert('A funcionalidade de Login com Google está em desenvolvimento.\n\nPor favor, utilize o login padrão com Usuário e Senha para esta demonstração.');
      });
    }
  </script>
</body>

</html>
