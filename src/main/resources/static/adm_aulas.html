     <div class="conteiner">
     <div class="titulo" style="margin-top: 5%; margin-bottom: 15px;">
      <h1>Administrar vídeos aulas</h1>
     </div>

     <div class="border p-3 mb-4" style="width: 750px; background:#fff;">
        <h5 class="mb-3">Cadastrar/Atualizar vídeo</h5>
        <div class="row g-2">
            <div class="col-md-4">
                <input id="tituloVideo" class="form-control" placeholder="Título (único)" />
            </div>
            <div class="col-md-4">
                <input id="descricaoVideo" class="form-control" placeholder="Descrição" />
            </div>
            <div class="col-md-4">
                <input id="pilarVideo" class="form-control" placeholder="Pilar" />
            </div>
        </div>
        <div class="mt-3 d-flex gap-2">
            <button class="btn btn-primary" id="btnSalvarVideo">Salvar</button>
            <button class="btn btn-secondary" id="btnLimparVideo">Limpar</button>
        </div>
        <small class="text-muted d-block mt-2">Salvar com o mesmo título atualiza descrição/pilar.</small>
     </div>

     <div class="tabela">
      <div class="tabela border" style="background:#fff;">
      <table class="table table-striped mb-0" style="width: 750px;">
        <thead>
        <tr class="px-3">
          <th>Título</th>
          <th>Descrição</th>
          <th>Pilar</th>
          <th>Editar</th>
          <th>Excluir</th>
        </tr>
        </thead>
        <tbody id="videosBody">
        </tbody>
      </table>
    </div>
    </div>
    </div>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
     <script>
      const tituloVideo = document.getElementById('tituloVideo');
      const descricaoVideo = document.getElementById('descricaoVideo');
      const pilarVideo = document.getElementById('pilarVideo');
      const btnSalvarVideo = document.getElementById('btnSalvarVideo');
      const btnLimparVideo = document.getElementById('btnLimparVideo');
      const tbody = document.getElementById('videosBody');

      btnLimparVideo.addEventListener('click', () => {
        tituloVideo.value = '';
        descricaoVideo.value = '';
        pilarVideo.value = '';
      });

      btnSalvarVideo.addEventListener('click', async () => {
        if (!tituloVideo.value.trim()) { alert('Informe o título.'); return; }
        try {
          const payload = {
            tituloVideo: tituloVideo.value.trim(),
            descricaoVideo: descricaoVideo.value.trim(),
            pilar_pc: pilarVideo.value.trim()
          };

          // Tenta buscar para decidir se cria ou atualiza
          const existente = await fetch(`/video?tituloVideo=${encodeURIComponent(payload.tituloVideo)}`);
          if (existente.ok) {
            await fetch('/video', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
          } else {
            const resPost = await fetch('/video', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (!resPost.ok) {
                const errorText = await resPost.text();
                throw new Error(errorText || 'Erro ao salvar vídeo');
            }
          }
          await carregarVideos();
          alert('Vídeo salvo.');
        } catch (e) {
          alert('Erro: ' + e.message);
        }
      });

      async function carregarVideos() {
        try {
          const res = await fetch('/video/all');
          if (!res.ok) throw new Error('Falha ao carregar vídeos');
          const dados = await res.json();
          tbody.innerHTML = '';
          dados.forEach(v => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${v.tituloVideo || ''}</td>
              <td>${v.descricaoVideo || ''}</td>
              <td>${v.pilar_pc || ''}</td>
              <td><button class="btn btn-sm btn-success">Editar</button></td>
              <td><button class="btn btn-sm btn-danger">Excluir</button></td>
            `;
            tr.querySelector('.btn-success').addEventListener('click', () => {
              tituloVideo.value = v.tituloVideo || '';
              descricaoVideo.value = v.descricaoVideo || '';
              pilarVideo.value = v.pilar_pc || '';
              window.scrollTo({top: 0, behavior: 'smooth'});
            });
            tr.querySelector('.btn-danger').addEventListener('click', async () => {
              if (!confirm(`Excluir vídeo "${v.tituloVideo}"?`)) return;
              const resDel = await fetch(`/video?tituloVideo=${encodeURIComponent(v.tituloVideo)}`, { method: 'DELETE' });
              if (!resDel.ok) { alert('Erro ao excluir'); return; }
              await carregarVideos();
            });
            tbody.appendChild(tr);
          });
        } catch (e) {
          tbody.innerHTML = '<tr><td colspan="5">Erro ao carregar vídeos.</td></tr>';
        }
      }

      carregarVideos();
     </script>
</body>
