    <!---->
    <div class="conteiner">
      <div class="titulo" style="margin-top: 5%; margin-bottom: 15px;">
        <h1>Administrar contas de usuários</h1>
      </div>

      <!-- Search Bar -->
      <div class="input-group mb-3" style="width: 750px; margin-left: 10px;">
        <input type="text" id="inputCpf" class="form-control" placeholder="Buscar por CPF..." aria-label="Buscar user">
        <button class="btn btn-outline-secondary" type="button" id="btnBuscar">Buscar</button>
        <button class="btn btn-outline-danger" type="button" id="btnLimpar">Limpar</button>
      </div>

      <div class="tabela">
        <div class="tabela border">
          <table class="table table-striped mb-0" style="width: 750px;">
            <thead>
              <tr class="px-3">
                <th>ID</th>
                <th>User</th>
                <th>Plano</th>
                <th>Email</th>
                <th>CPF</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaUsuarios">
              <!-- Rows will be populated by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
      crossorigin="anonymous"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const tabela = document.getElementById('tabelaUsuarios');
        const inputCpf = document.getElementById('inputCpf');
        const btnBuscar = document.getElementById('btnBuscar');
        const btnLimpar = document.getElementById('btnLimpar');

        // Function to render users
        const renderUsers = (users) => {
          tabela.innerHTML = '';
          if (users.length === 0) {
            tabela.innerHTML = '<tr><td colspan="6" class="text-center">Nenhum usuário encontrado.</td></tr>';
            return;
          }

          users.forEach(user => {
            const row = document.createElement('tr');

            // Format CPF
            let cpfFormatted = user.cpf || '---';
            if (user.cpf && user.cpf.length <= 11) {
              const clean = user.cpf.replace(/\D/g, '').padStart(11, '0');
              if (clean.length === 11) {
                cpfFormatted = clean.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
              }
            }

            row.innerHTML = `
               <td>${user.id}</td>
               <td>${user.username || '-'}</td>
               <td>${user.type || '-'}</td>
               <td>${user.email || '-'}</td>
               <td>${cpfFormatted}</td>
               <td>
                  <a href="editar_adm_user.html?id=${user.id}" class="btn btn-success btn-sm">
                    <i class="bi bi-pencil-square"></i> Editar
                  </a>
                  <button class="btn btn-danger btn-sm" onclick="excluirUsuario(${user.id})">
                    <i class="bi bi-trash"></i> Excluir
                  </button>
               </td>
             `;
            tabela.appendChild(row);
          });
        };

        // Fetch all users
        const fetchUsers = async () => {
          try {
            const res = await fetch('/educabit/usuario');
            if (res.ok) {
              const data = await res.json();
              renderUsers(data);
            } else {
              alert('Erro ao listar usuários');
            }
          } catch (e) {
            console.error(e);
            alert('Erro de conexão');
          }
        };

        // Search by CPF
        const searchByCpf = async (cpf) => {
          if (!cpf) {
            fetchUsers();
            return;
          }
          try {
            const res = await fetch(`/educabit/usuario/buscar?cpf=${cpf}`);
            if (res.ok) {
              const data = await res.json();
              renderUsers(data);
            } else {
              alert('Erro na busca');
            }
          } catch (e) {
            console.error(e);
          }
        };

        // Delete user logic
        window.excluirUsuario = async (id) => {
          if (confirm('Tem certeza que deseja excluir o usuário ID ' + id + '?')) {
            try {
              const res = await fetch(`/educabit/usuario/${id}`, { method: 'DELETE' });
              if (res.ok) {
                alert('Usuário excluído!');
                fetchUsers();
              } else {
                alert('Erro ao excluir');
              }
            } catch (e) {
              alert('Erro de conexão ao excluir');
            }
          }
        };

        // Event Listeners
        btnBuscar.addEventListener('click', () => {
          searchByCpf(inputCpf.value.trim());
        });

        btnLimpar.addEventListener('click', () => {
          inputCpf.value = '';
          fetchUsers();
        });

        // Initial Load
        fetchUsers();
      });
    </script>
  </body>
