  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <link rel="icon" href="img/EducaBit_logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <title>EDUCABIT</title>
</head>

<body style="background-color: #f5f5f5;">
  <div class="d-flex flex-column flex-shrink-0 p-3 text-bg-dark" style="width: 280px; height:100vh; position:fixed">
    <a href="adm.html" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
      <span class="fs-4">Painel de Controle</span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
      <li>
        <a href="adm_user.html" class="nav-link text-white hover-link">
          <svg class="bi pe-none me-2" width="16" height="16">
            <use xlink:href="#speedometer2" />
          </svg>
          Contas de usuários
        </a>
      </li>
      <li>
        <a href="adm_aulas.html" class="nav-link text-white hover-link">
          <svg class="bi pe-none me-2" width="16" height="16">
            <use xlink:href="#speedometer2" />
          </svg>
          Admin de aulas
        </a>
      </li>
      <li>
        <a href="adm_jogos.html" class="nav-link text-white hover-link" class="texto">
          <svg class="bi pe-none me-2" width="16" height="16">
            <use xlink:href="#speedometer2" />
          </svg>
          Admin de jogos
        </a>
      </li>
      <li>
        <a href="adm.html" class="nav-link text-white hover-link">
          <svg class="bi pe-none me-2" width="16" height="16">
            <use xlink:href="#speedometer2" />
          </svg>
          Adm Criador
        </a>
      </li>
    </ul>
    <hr>
    <div class="dropdown">
      <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
        data-bs-toggle="dropdown" aria-expanded="false">
        <strong>Administrador</strong>
      </a>
      <ul class="dropdown-menu dropdown-menu-dark text-small shadow">
        <li><a class="dropdown-item" href="tela_inicial.html">Deslogar</a></li>
      </ul>
    </div>
  </div>

  <!-- Main Content -->
  <div style="margin-left: 280px; padding: 20px;">
    <h2>Solicitações de Criador Pendentes</h2>
    <div class="table-responsive mt-4">
      <table class="table table-striped table-hover border">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Documento</th>
            <th>Links</th>
            <th>Info</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="pedidosTable">
          <!-- Loaded via JS -->
        </tbody>
      </table>
      <div id="emptyMsg" class="alert alert-info d-none">Nenhuma solicitação pendente.</div>
    </div>
  </div>

  <!-- Modal de Detalhes (Opcional, mas útil para ver bio longa) -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', loadPendingRequests);

    async function loadPendingRequests() {
      try {
        const res = await fetch('/api/admin/criadores/pendentes');
        if (!res.ok) throw new Error('Falha ao carregar');

        const users = await res.json();
        const tbody = document.getElementById('pedidosTable');
        const emptyMsg = document.getElementById('emptyMsg');
        tbody.innerHTML = '';

        if (users.length === 0) {
          emptyMsg.classList.remove('d-none');
          return;
        }
        emptyMsg.classList.add('d-none');

        users.forEach(u => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
                        <td>${u.id}</td>
                        <td>${u.username}</td>
                        <td>
                            <b>${u.documentType || '-'}</b><br>
                            ${u.documentUrl ? `<a href="${u.documentUrl}" target="_blank" class="text-decoration-none">Ver Foto</a>` : '-'}
                        </td>
                        <td>
                            ${u.linkedinUrl ? `<a href="${u.linkedinUrl}" target="_blank" class="btn btn-sm btn-outline-primary mb-1"><i class="bi bi-linkedin"></i> LinkedIn</a>` : '-'}<br>
                            ${u.lattesUrl ? `<a href="${u.lattesUrl}" target="_blank" class="btn btn-sm btn-outline-secondary">Lattes</a>` : ''}
                        </td>
                        <td>
                           <small><b>Tel:</b> ${u.phone || '-'}</small><br>
                           <small title="${u.bio}"><b>Bio:</b> ${u.bio ? u.bio.substring(0, 30) + '...' : '-'}</small>
                        </td>
                        <td>
                            <button onclick="processRequest(${u.id}, true)" class="btn btn-success btn-sm">Aprovar</button>
                            <button onclick="processRequest(${u.id}, false)" class="btn btn-danger btn-sm">Rejeitar</button>
                        </td>
                    `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error(err);
        alert('Erro ao carregar solicitações.');
      }
    }

    async function processRequest(userId, approved) {
      if (!confirm(approved ? 'Tem certeza que deseja APROVAR este usuário?' : 'Tem certeza que deseja REJEITAR este usuário?')) return;

      try {
        const res = await fetch('/api/admin/criadores/aprovar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, approved, reason: approved ? 'Admin approved' : 'Admin rejected' })
        });

        if (res.ok) {
          alert('Processado com sucesso!');
          loadPendingRequests();
        } else {
          alert('Erro ao processar.');
        }
      } catch (e) {
        alert('Erro na comunicação.');
      }
    }
  </script>

</html>
